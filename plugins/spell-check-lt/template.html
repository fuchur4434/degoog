<div class="spellcheck-lt-banner">
  <div class="spellcheck-lt-line">
    Showing results for
    <a class="spellcheck-lt-corrected" href="/search?q={{corrected}}">{{corrected}}</a>
  </div>
  <div class="spellcheck-lt-line spellcheck-lt-original">
    Search instead for
    <a class="spellcheck-lt-skip" href="{{search_url}}" data-skip-endpoint="{{skip_endpoint}}" data-q="{{original}}">{{original}}</a>
  </div>
</div>
